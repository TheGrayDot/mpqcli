name: Pull Request

on:
  pull_request

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
  lint:
    uses: ./.github/workflows/lint.yml
    needs: build
  test:
    uses: ./.github/workflows/test.yml
    needs: build
  valgrind:
    uses: ./.github/workflows/valgrind.yml
