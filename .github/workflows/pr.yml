name: Pull Request

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".clang-format"
      - ".clang-tidy"
      - "src/**"
      - "extern/**"
      - "test/**"
      - "CMakeLists.txt"
      - "Dockerfile.glibc"
      - "Dockerfile.musl"

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
  lint:
    uses: ./.github/workflows/lint.yml
    needs: build
  test:
    uses: ./.github/workflows/test.yml
    needs: build
  valgrind:
    uses: ./.github/workflows/valgrind.yml
