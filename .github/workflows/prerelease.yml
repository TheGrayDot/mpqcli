name: Prerelease

on:
  workflow_call

permissions:
  contents: write
  packages: write

jobs:
  prerelease_binaries:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Linux GLIBC binary
        uses: actions/download-artifact@v7
        with:
          name: mpqcli-linux-amd64-glibc

      - name: Download Linux MUSL binary
        uses: actions/download-artifact@v7
        with:
          name: mpqcli-linux-amd64-musl

      - name: Download Linux ARM64 GLIBC binary
        uses: actions/download-artifact@v7
        with:
          name: mpqcli-linux-arm64-glibc

      - name: Download Linux ARM64 MUSL binary
        uses: actions/download-artifact@v7
        with:
          name: mpqcli-linux-arm64-musl

      - name: Download Windows binary
        uses: actions/download-artifact@v7
        with:
          name: mpqcli-windows-amd64.exe

      - name: Delete existing dev release
        run: |
          gh release delete dev --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Dev (Pre-release)
          prerelease: true
          files: |
            mpqcli-linux-amd64-glibc
            mpqcli-linux-amd64-musl
            mpqcli-linux-arm64-glibc
            mpqcli-linux-arm64-musl
            mpqcli-windows-amd64.exe
          body: |
            **Commit:** ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  prerelease_docker:
    needs: prerelease_binaries
    runs-on: ubuntu-24.04
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v7
        with:
          name: mpqcli-docker

      - name: Load Docker image
        run: |
          docker load -i mpqcli-docker.tar

      - name: Tag Docker image as dev
        run: |
          docker tag mpqcli ghcr.io/thegraydot/mpqcli:dev

      - name: Push Docker image to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/thegraydot/mpqcli:dev
